  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e8;
      --panel: rgba(255,255,255,0.82);
      --ink: #172126;
      --muted: #5f6a70;
      --line: rgba(23,33,38,0.12);
      --accent: #0f766e;
      --accent-soft: rgba(15,118,110,0.12);
      --warn: #b45309;
      --fail: #b91c1c;
      --shadow: 0 24px 60px rgba(23,33,38,0.08);
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(15,118,110,0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(180,83,9,0.14), transparent 30%),
        var(--bg);
      color: var(--ink);
    }
    main { width: min(1160px, calc(100% - 32px)); margin: 32px auto 56px; }
    .hero, .panel {
      background: var(--panel);
      backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    .hero { padding: 32px; }
    .eyebrow { text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-size: 12px; }
    h1 { margin: 12px 0 8px; font-size: clamp(2rem, 5vw, 4rem); line-height: 0.95; }
    .lede { color: var(--muted); max-width: 60ch; font-size: 1.05rem; }
    .metrics, .grid, .cards { display: grid; gap: 16px; }
    .metrics { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin-top: 24px; }
    .metric, .card { background: #fff; border-radius: 18px; border: 1px solid var(--line); padding: 18px; }
    .metric strong { display: block; font-size: 2rem; margin-top: 10px; }
    .grid { grid-template-columns: 1.1fr 0.9fr; margin-top: 20px; }
    .panel { padding: 24px; }
    h2 { margin: 0 0 16px; font-size: 1.2rem; }
    ul { margin: 0; padding-left: 18px; }
    li + li { margin-top: 8px; }
    .cards { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .status { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .pass { background: rgba(15,118,110,0.12); color: var(--accent); }
    .warn { background: rgba(180,83,9,0.12); color: var(--warn); }
    .fail { background: rgba(185,28,28,0.12); color: var(--fail); }
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    th, td { text-align: left; padding: 10px 0; border-bottom: 1px solid var(--line); vertical-align: top; }
    .muted { color: var(--muted); }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>

  <script>
    const dossier = JSON.parse(document.getElementById('dossier').textContent);
    const app = document.getElementById('app');
    const metric = (label, value) => `<div class="metric"><div class="muted">${label}</div><strong>${value}</strong></div>`;
    const statusClass = (value) => value === 'pass' ? 'pass' : value === 'warn' ? 'warn' : 'fail';
    app.innerHTML = `
      <section class="hero">
        <div class="eyebrow">Occupation-Ops flagship proof dossier</div>
        <h1>${dossier.summary.title}</h1>
        <p class="lede">${dossier.summary.positioning}</p>
        <div class="metrics">
          ${metric('Role proof score', dossier.summary.scoreTen + '/10')}
          ${metric('Proof density', dossier.metrics.proofDensity + '/100')}
          ${metric('Claim support ratio', dossier.metrics.claimSupportRatio + '/100')}
          ${metric('Recruiter scan readiness', dossier.metrics.recruiterScanReadiness + '/100')}
        </div>
      </section>
      <div class="grid">
        <section class="panel">
          <h2>Prioritized proof backlog</h2>
          <ul>${dossier.backlog.map(item => `<li><strong>${item.title}</strong><br><span class="muted">${item.nextAction}</span></li>`).join('')}</ul>

        <section class="panel">
          <h2>GitHub headline rewrite</h2>
          <p>${dossier.githubPlan.headlineRewrite}</p>
          <h2 style="margin-top:24px;">README checklist</h2>

          </tbody>
        </table>
