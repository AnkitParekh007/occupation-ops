name: Success story
description: Share a truthful outcome or learning from using Occupation-Ops
title: "[Story]: "
labels: ["story"]
body:
  - type: markdown
    attributes:
      value: |
        Please share only truthful, non-sensitive information. Do not include private employer, recruiter, or compensation details.
  - type: textarea
    id: story
    attributes:
      label: What changed?
      description: What did you improve, ship, or learn?
    validations:
      required: true
