name: Feature request
description: Suggest an Occupation-Ops improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What career-readiness problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the track, mode, template, script, or docs change.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: This does not require fake claims or fake metrics.
          required: true
        - label: This does not automate spam or unreviewed applications.
          required: true
