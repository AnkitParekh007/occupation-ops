name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          pr_message: |
            Welcome to Occupation-Ops, @${{ github.actor }}. Thanks for your first PR.

            Please make sure:
            - examples are clearly marked as examples
            - no private career data is included
            - no fake claims, fake metrics, or fake testimonials are added
            - `npm run doctor` passes
          issue_message: |
            Thanks for opening your first issue, @${{ github.actor }}.

            Please include the target occupation, the workflow mode, and any command output that helps reproduce the issue.
